<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Nusa &amp; North</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/nusa-and-north/favicon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #131110;
        color: #fafaf6;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        text-align: center;
        padding: 24px;
      }
      .rec {
        display: inline-block;
        width: 0.7em;
        height: 0.7em;
        border-radius: 50%;
        background: #e8362b;
        margin-right: 0.5em;
        animation: blink 1.2s steps(1) infinite;
      }
      @keyframes blink { 50% { opacity: 0.15; } }
      .kicker { font-size: 12px; letter-spacing: 0.3em; color: rgba(250,250,246,0.55); }
      h1 {
        margin: 0.6em 0 0.4em;
        font-family: system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(2rem, 8vw, 4.5rem);
        letter-spacing: -0.01em;
      }
      p { font-size: 13px; letter-spacing: 0.08em; color: rgba(250,250,246,0.6); }
      a {
        display: inline-block;
        margin-top: 2.2em;
        color: #fafaf6;
        border: 1px solid rgba(250,250,246,0.4);
        border-radius: 2px;
        padding: 0.9em 2em;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-decoration: none;
      }
      a:hover { background: #fafaf6; color: #131110; }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker"><span class="rec"></span>MEDIA OFFLINE</p>

    </main>
  </body>
</html>
