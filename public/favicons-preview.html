<meta charset="utf-8">
<style>
  body { font-family: -apple-system, sans-serif; background: #f0f0ec; margin: 0; padding: 40px; }
  .row { display: flex; gap: 60px; margin-bottom: 50px; align-items: center; }
  .label { width: 220px; font-weight: 700; font-size: 15px; }
  .sizes { display: flex; gap: 28px; align-items: center; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; color: #666; }
  .dark { background: #16130f; padding: 14px 20px; border-radius: 10px; }
  .dark .chip { color: #aaa; }
</style>
<div id="root"></div>
<script>
const svgs = {
  "A · THE FRAME (brackets + REC)": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="12" fill="#131110"/>
    <g stroke="#fafaf6" stroke-width="5" fill="none">
      <path d="M12 24 V12 H24"/><path d="M40 12 H52 V24"/>
      <path d="M52 40 V52 H40"/><path d="M24 52 H12 V40"/>
    </g>
    <circle cx="32" cy="32" r="9" fill="#e8362b"/>
  </svg>`,
  "B · THE AMPERSAND (& + dot)": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="12" fill="#fafaf6"/>
    <text x="29" y="49" font-family="Archivo, Arial Black, sans-serif" font-weight="900" font-size="46" text-anchor="middle" fill="#131110">&amp;</text>
    <circle cx="51" cy="15" r="7" fill="#e8362b"/>
  </svg>`,
  "C · TRUE NORTH (needle + dot)": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="12" fill="#131110"/>
    <path d="M32 8 L44 50 L32 41 L20 50 Z" fill="#fafaf6"/>
    <circle cx="32" cy="12" r="7" fill="#e8362b"/>
  </svg>`,
  "D · THE FLAP (split tile N)": `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="12" fill="#131110"/>
    <rect x="8" y="8" width="48" height="48" rx="8" fill="#26221f"/>
    <text x="32" y="49" font-family="Archivo, Arial Black, sans-serif" font-weight="900" font-size="42" text-anchor="middle" fill="#fafaf6">N</text>
    <rect x="8" y="31" width="48" height="2.5" fill="#131110"/>
    <circle cx="49" cy="17" r="5" fill="#e8362b"/>
  </svg>`,
};
const root = document.getElementById('root');
for (const [name, svg] of Object.entries(svgs)) {
  const enc = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  root.insertAdjacentHTML('beforeend', `
    <div class="row">
      <div class="label">${name}</div>
      <div class="sizes">
        ${[64, 32, 16].map(s => `<div class="chip"><img src="${enc}" width="${s}" height="${s}">${s}px</div>`).join('')}
        <div class="dark"><div class="chip"><img src="${enc}" width="32" height="32">on dark tab</div></div>
      </div>
    </div>`);
}
</script>
